<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord — LifeStealz.net</title>
  <meta name="description" content="Join the LifeStealz.net Discord community — the competitive Minecraft LifeSteal SMP server." />
  <meta property="og:title" content="Discord — LifeStealz.net" />
  <meta property="og:image" content="https://i.ibb.co/gL1DkH98/upsized.png" />
  <meta property="og:url" content="https://www.lifestealz.net/discord" />
  <link rel="canonical" href="https://www.lifestealz.net/discord" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta http-equiv="refresh" content="0;url=https://discord.gg/lifestealz" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #111111;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap { padding: 40px 20px; }
    .logo {
      width: 80px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 20px rgba(139,26,26,0.6));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      color: #5865F2;
      margin-bottom: 8px;
    }
    p { color: #cccccc; font-size: 0.9rem; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }
    a:hover { background: #4752c4; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="https://i.ibb.co/gL1DkH98/upsized.png" alt="LifeStealz Logo" />
    <h1>Join our Discord</h1>
    <p>Redirecting you to our Discord server...</p>
    <a href="https://discord.gg/lifestealz">Join Discord →</a>
  </div>
  <script>window.location.replace("https://discord.gg/lifestealz");</script>
</body>
</html>
